name: Publish NuGet Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Extract Umbraco version
        id: version
        run: |
          VERSION=$(grep -oP 'Include="Umbraco\.Cms" Version="\K[^"]+' content/GreenStack.Umbraco.UmBootstrap/GreenStack.Umbraco.UmBootstrap/GreenStack.Umbraco.UmBootstrap.csproj)
          MAJOR="${VERSION%%.*}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Find previous tag in same major version
        id: previous
        run: |
          git -c fetch.recurseSubmodules=no fetch --tags --no-recurse-submodules
          PREV=$(git tag --list "v${{ steps.version.outputs.major }}.*" --sort=-v:refname | grep -v "^v${{ steps.version.outputs.version }}$" | head -n 1)
          echo "tag=$PREV" >> $GITHUB_OUTPUT

      - name: Check if version already published
        id: check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Assemble pack directory
        if: steps.check.outputs.exists == 'false'
        run: chmod +x ./build.sh && ./build.sh

      - name: Pack
        if: steps.check.outputs.exists == 'false'
        run: dotnet pack -p:PackageVersion=${{ steps.version.outputs.version }} -p:UmbracoCmsVersion=${{ steps.version.outputs.version }} -o ./nupkg

      - name: Push to GitHub Packages
        if: steps.check.outputs.exists == 'false'
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/UmbHost/index.json"

      - name: Push to NuGet.org
        if: steps.check.outputs.exists == 'false'
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source "https://api.nuget.org/v3/index.json"

      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          previous_tag: ${{ steps.previous.outputs.tag }}
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          files: ./nupkg/*.nupkg
